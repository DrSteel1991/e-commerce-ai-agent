[project]
name = "ecommerce-contracts"
version = "0.1.0"
description = "Shared API contracts for e-commerce microservices"
requires-python = ">=3.11"
dependencies = [
    "pydantic[email]>=2.0",
    "fastapi>=0.100",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
